_target_: src.models.gigaPose.GigaPose
model_name: large
log_dir: ${save_dir}
template_cache_dir: ${machine.root_dir}/template_cache
template_cache_enabled: true

defaults:
  - ae_net: dinov2_l
  - ist_net: resnet

testing_metric:
  _target_: src.models.matching.LocalSimilarity
  k: 1
  sim_threshold: 0.5
  patch_threshold: 3

checkpoint_path: ${machine.root_dir}/pretrained/gigaPose_v1.ckpt
