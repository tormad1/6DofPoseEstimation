name: gigapose
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - pip<24.1
  - python=3.9.6
  - pinocchio=2.6.20
  - pip:
    - torch
    - torchvision
    - omegaconf
    - torchmetrics==0.10.3
    - fvcore
    - iopath
    - pycocotools
    - scipy
    - hydra-core
    - pytorch-lightning==1.8.3
    - pandas
    - webdataset
    - imageio
    - einops
    - pillow
    - tqdm
