name: gigapose
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
    - torch
    - torchvision
    - numpy
    - omegaconf
    - torchmetrics==0.10.3
    - fvcore
    - iopath
    - pycocotools
    - scipy
    - hydra-core
    - pytorch-lightning==1.8.3
    - pandas
    - einops
    - pillow
    - tqdm
